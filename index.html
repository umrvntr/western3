<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Match Three</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cell: 42px;
    --gap: 3px;
    --board-size: calc(8 * var(--cell) + 7 * var(--gap));
    --green:     #00ff88;
    --green-d:   #00cc66;
    --green-lo:  #003318;
    --amber:     #ffcc00;
    --red:       #ff4466;
    --blue:      #44aaff;
    --bg:        #080c08;
    --surface:   #0c110c;
    --border:    #162416;
    --text:      #a8d8a8;
    --text-dim:  #4a744a;
  }

  html, body { height: 100%; overflow: hidden; touch-action: manipulation; }

  body {
    background: var(--bg);
    height: 100dvh; height: 100vh; height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', Courier, monospace;
    color: var(--text);
    padding: max(clamp(6px, 2vh, 18px), env(safe-area-inset-top))
             max(10px, env(safe-area-inset-right))
             max(clamp(6px, 2vh, 18px), env(safe-area-inset-bottom))
             max(10px, env(safe-area-inset-left));
  }

  /* CRT scanlines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* CRT vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.65) 100%);
    pointer-events: none;
    z-index: 999;
  }

  header {
    text-align: center;
    margin-bottom: clamp(6px, 1.8vh, 16px);
    flex-shrink: 0;
  }
  header h1 {
    font-size: clamp(0.52rem, 1.9vw, 0.72rem);
    font-weight: normal;
    letter-spacing: clamp(6px, 2.5vw, 12px);
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .cursor {
    display: inline-block;
    width: 7px;
    height: 0.85em;
    background: var(--green-d);
    vertical-align: text-bottom;
    margin-left: 3px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .hud {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: clamp(20px, 5vw, 44px);
    width: min(calc(var(--board-size) + 24px), 96vw);
    margin-bottom: clamp(8px, 2vh, 16px);
    flex-shrink: 0;
  }

  .score-box { text-align: center; background: none; border: none; padding: 0; box-shadow: none; }
  .score-box span:first-child {
    font-size: clamp(0.36rem, 1vw, 0.46rem);
    display: block;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .score-box span:first-child::before { content: '// '; }
  .score-box span:last-child {
    font-size: clamp(1.2rem, 4.2vw, 1.55rem);
    color: var(--green);
    text-shadow: 0 0 12px rgba(0,255,136,0.55);
    letter-spacing: 2px;
  }
  #combo-box span:last-child {
    font-size: clamp(0.88rem, 3vw, 1.1rem);
    color: var(--green-d);
    text-shadow: 0 0 8px rgba(0,204,102,0.45);
  }

  .mute-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    font-family: 'Courier New', Courier, monospace;
    font-size: clamp(0.55rem, 1.6vw, 0.68rem);
    letter-spacing: 1px;
    transition: color 0.2s, border-color 0.2s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    padding: 3px 7px;
    line-height: 1.7;
    text-transform: uppercase;
  }
  .mute-btn:hover, .mute-btn:active { color: var(--green-d); border-color: var(--green-lo); }

  .board-wrap {
    background: rgba(0,14,6,0.55);
    border: 1px solid var(--border);
    padding: clamp(5px, 1.4vw, 9px);
    box-shadow: 0 0 32px rgba(0,255,136,0.04), inset 0 0 20px rgba(0,0,0,0.5);
    position: relative;
    max-width: 96vw;
  }

  #board {
    display: grid;
    grid-template-columns: repeat(8, var(--cell));
    grid-template-rows: repeat(8, var(--cell));
    gap: var(--gap);
    touch-action: none;
  }

  .cell {
    width: var(--cell);
    height: var(--cell);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: calc(var(--cell) * 0.44);
    line-height: 1;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: transform 0.13s ease-out, box-shadow 0.13s;
    position: relative;
    border: 1px solid var(--border);
    background: var(--surface);
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .cell:hover   { transform: scale(1.07); }
  .cell.selected { transform: scale(1.1); z-index: 2; }
  .cell.matching { animation: cell-pop 0.34s ease-out forwards; }
  .cell.new-tile  { animation: cell-in  0.26s ease-out; }

  .t0 { color: var(--green);  border-color: rgba(0,255,136,0.2);  text-shadow: 0 0 10px rgba(0,255,136,0.75);  box-shadow: inset 0 0 10px rgba(0,255,136,0.06); }
  .t1 { color: var(--amber);  border-color: rgba(255,204,0,0.2);   text-shadow: 0 0 10px rgba(255,204,0,0.75);   box-shadow: inset 0 0 10px rgba(255,204,0,0.06); }
  .t2 { color: var(--red);    border-color: rgba(255,68,102,0.2);  text-shadow: 0 0 10px rgba(255,68,102,0.75);  box-shadow: inset 0 0 10px rgba(255,68,102,0.06); }
  .t3 { color: var(--blue);   border-color: rgba(68,170,255,0.2);  text-shadow: 0 0 10px rgba(68,170,255,0.75);  box-shadow: inset 0 0 10px rgba(68,170,255,0.06); }

  .cell.selected.t0 { border-color: var(--green); box-shadow: 0 0 12px rgba(0,255,136,0.7), inset 0 0 8px rgba(0,255,136,0.12); text-shadow: 0 0 18px rgba(0,255,136,1); }
  .cell.selected.t1 { border-color: var(--amber); box-shadow: 0 0 12px rgba(255,204,0,0.7),  inset 0 0 8px rgba(255,204,0,0.12);  text-shadow: 0 0 18px rgba(255,204,0,1); }
  .cell.selected.t2 { border-color: var(--red);   box-shadow: 0 0 12px rgba(255,68,102,0.7), inset 0 0 8px rgba(255,68,102,0.12); text-shadow: 0 0 18px rgba(255,68,102,1); }
  .cell.selected.t3 { border-color: var(--blue);  box-shadow: 0 0 12px rgba(68,170,255,0.7), inset 0 0 8px rgba(68,170,255,0.12); text-shadow: 0 0 18px rgba(68,170,255,1); }

  @keyframes cell-pop {
    0%   { transform: scale(1);   opacity: 1; filter: brightness(1); }
    28%  { transform: scale(1.2); opacity: 1; filter: brightness(4); }
    100% { transform: scale(0.1); opacity: 0; filter: brightness(0); }
  }
  @keyframes cell-in {
    0%   { transform: scale(0.2); opacity: 0; filter: brightness(4); }
    55%  { filter: brightness(1.6); }
    100% { transform: scale(1);   opacity: 1; filter: brightness(1); }
  }

  .score-popup {
    position: absolute;
    font-size: clamp(0.48rem, 1.5vw, 0.6rem);
    font-family: 'Courier New', Courier, monospace;
    color: var(--green-d);
    text-shadow: 0 0 6px rgba(0,204,102,0.65);
    pointer-events: none;
    animation: float-up 0.85s ease-out forwards;
    z-index: 10;
    white-space: nowrap;
    letter-spacing: 1px;
  }
  @keyframes float-up {
    0%   { opacity: 0.9; transform: translateY(0); }
    100% { opacity: 0;   transform: translateY(-38px); }
  }

  .combo-flash {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 20;
    background: rgba(0,8,4,0.35);
    animation: combo-appear 0.8s ease-out forwards;
  }
  .combo-word {
    font-family: 'Courier New', Courier, monospace;
    font-size: clamp(0.95rem, 4.5vw, 1.55rem);
    color: var(--green);
    text-shadow: 0 0 22px rgba(0,255,136,0.85);
    letter-spacing: 5px;
    text-transform: uppercase;
    line-height: 1;
  }
  .combo-word::before { content: '[ '; color: var(--green-d); }
  .combo-word::after  { content: ' ]'; color: var(--green-d); }
  .combo-sub {
    font-family: 'Courier New', Courier, monospace;
    font-size: clamp(0.38rem, 1.3vw, 0.5rem);
    color: var(--text-dim);
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-top: 7px;
  }
  @keyframes combo-appear {
    0%   { opacity: 0; }
    12%  { opacity: 1; }
    62%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(-10px); }
  }
  @keyframes combo-record-pulse {
    0%,100% { color: var(--green-d); text-shadow: 0 0 8px rgba(0,204,102,0.4); }
    50%      { color: var(--green);  text-shadow: 0 0 22px rgba(0,255,136,1); }
  }
  .combo-record span:last-child { animation: combo-record-pulse 0.6s ease-in-out; }

  footer { display: none; }
  @media (max-height: 500px) { header { display: none; } }
</style>
</head>
<body>

<header>
  <h1>MATCH THREE<span class="cursor"></span></h1>
</header>

<div class="hud">
  <div class="score-box">
    <span>SCORE</span>
    <span id="score-val">0</span>
  </div>
  <div class="score-box" id="combo-box">
    <span>MAX COMBO</span>
    <span id="combo-val">x1</span>
  </div>
  <button class="mute-btn" id="mute-btn" title="Toggle sound">[sfx:on]</button>
</div>

<div class="board-wrap">
  <div id="board"></div>
</div>

<footer>~ ENDLESS FRONTIER ~</footer>

<script>
const COLS = 8, ROWS = 8, TYPES = 4;
const TILES = ['■','◆','▲','●'];
const TILE_LABEL = ['Green','Amber','Red','Blue'];

let board = [];
let selected = null;
let score = 0;
let busy = false;
let maxCombo = 1;

let audioCtx = null;
let ambientNodes = [];
let muted = false;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, type, duration, vol, delay = 0) {
  if (muted) return;
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
  gain.gain.setValueAtTime(0, ctx.currentTime + delay);
  gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
  osc.start(ctx.currentTime + delay);
  osc.stop(ctx.currentTime + delay + duration + 0.05);
}

function sfxSwap()    { playTone(220,'triangle',0.12,0.18); playTone(280,'triangle',0.10,0.12,0.05); }
function sfxInvalid() { playTone(160,'sawtooth',0.15,0.12); }
function sfxMatch(n)  { const b=440; for(let i=0;i<Math.min(n,6);i++) playTone(b*Math.pow(1.12,i),'sine',0.25,0.22,i*0.06); }
function sfxCascade(l){ playTone(330+l*80,'sine',0.3,0.2); playTone(495+l*80,'sine',0.3,0.15,0.08); }

function startAmbient() {
  if (muted) return;
  stopAmbient();
  const ctx = getAudioCtx();
  [82.4,110,146.8,165,196].forEach((f,i) => {
    const osc=ctx.createOscillator(), gain=ctx.createGain();
    const lfo=ctx.createOscillator(), lfoGain=ctx.createGain();
    const filter=ctx.createBiquadFilter();
    lfo.frequency.value=0.12+i*0.03; lfoGain.gain.value=1.5;
    lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
    osc.type=i%2===0?'sawtooth':'triangle'; osc.frequency.value=f;
    gain.gain.value=0.028-i*0.003;
    filter.type='lowpass'; filter.frequency.value=400+i*60;
    osc.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
    osc.start(); lfo.start();
    ambientNodes.push(osc,gain,lfo,lfoGain,filter);
  });
  schedulePluck();
}

function schedulePluck() {
  if (muted) return;
  setTimeout(() => {
    if (!muted) {
      const notes=[196,220,246.9,261.6,293.7,329.6];
      const n=notes[Math.floor(Math.random()*notes.length)];
      playTone(n,'triangle',0.8,0.09); playTone(n*2,'sine',0.5,0.04,0.01);
    }
    schedulePluck();
  }, 3000+Math.random()*5000);
}

function stopAmbient() {
  ambientNodes.forEach(n => { try { n.stop?n.stop():n.disconnect(); n.disconnect(); } catch(e){} });
  ambientNodes = [];
}

document.getElementById('mute-btn').addEventListener('click', () => {
  muted = !muted;
  document.getElementById('mute-btn').textContent = muted ? '[sfx:off]' : '[sfx:on]';
  if (muted) stopAmbient(); else startAmbient();
});

function randomType() { return Math.floor(Math.random()*TYPES); }

function initBoard() {
  do {
    board = [];
    for (let r=0;r<ROWS;r++) {
      board[r]=[];
      for (let c=0;c<COLS;c++) {
        let t;
        do { t=randomType(); }
        while ((c>=2&&board[r][c-1]===t&&board[r][c-2]===t)||(r>=2&&board[r-1][c]===t&&board[r-2][c]===t));
        board[r][c]=t;
      }
    }
  } while (findMatches().length>0 || !hasAnyMove());
}

function findMatches() {
  const matched=new Set();
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS-2;c++) {
    const t=board[r][c];
    if(t===board[r][c+1]&&t===board[r][c+2]) {
      let len=3; while(c+len<COLS&&board[r][c+len]===t)len++;
      for(let i=0;i<len;i++) matched.add(`${r},${c+i}`);
    }
  }
  for(let c=0;c<COLS;c++) for(let r=0;r<ROWS-2;r++) {
    const t=board[r][c];
    if(t===board[r+1][c]&&t===board[r+2][c]) {
      let len=3; while(r+len<ROWS&&board[r+len][c]===t)len++;
      for(let i=0;i<len;i++) matched.add(`${r+i},${c}`);
    }
  }
  return [...matched].map(k=>{ const [r,c]=k.split(',').map(Number); return{r,c}; });
}

function hasAnyMove() {
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) {
    if(c<COLS-1&&wouldMatch(r,c,r,c+1)) return true;
    if(r<ROWS-1&&wouldMatch(r,c,r+1,c)) return true;
  }
  return false;
}

function wouldMatch(r1,c1,r2,c2) {
  [board[r1][c1],board[r2][c2]]=[board[r2][c2],board[r1][c1]];
  const m=findMatches();
  [board[r1][c1],board[r2][c2]]=[board[r2][c2],board[r1][c1]];
  return m.length>0;
}

function renderBoard(animClass=null, animCells=[]) {
  const boardEl=document.getElementById('board');
  boardEl.innerHTML='';
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) {
    const cell=document.createElement('div');
    const t=board[r][c];
    cell.className=`cell t${t}`;
    if(animClass&&animCells.some(a=>a.r===r&&a.c===c)) cell.classList.add(animClass);
    if(selected&&selected.r===r&&selected.c===c) cell.classList.add('selected');
    cell.textContent=TILES[t];
    cell.title=TILE_LABEL[t];
    cell.dataset.r=r; cell.dataset.c=c;
    cell.addEventListener('click', onCellClick);
    cell.addEventListener('touchend', onTouchEnd, {passive:false});
    boardEl.appendChild(cell);
  }
}

function getCellEl(r,c) { return document.querySelector(`#board .cell[data-r="${r}"][data-c="${c}"]`); }

function addScore(n,r,c) {
  score+=n*10;
  document.getElementById('score-val').textContent=score;
  const boardWrap=document.querySelector('.board-wrap');
  const cellEl=getCellEl(r,c);
  if(cellEl) {
    const popup=document.createElement('div');
    popup.className='score-popup';
    popup.textContent=`+${n*10}`;
    const rect=cellEl.getBoundingClientRect();
    const wrapRect=boardWrap.getBoundingClientRect();
    popup.style.left=(rect.left-wrapRect.left+10)+'px';
    popup.style.top=(rect.top-wrapRect.top-10)+'px';
    boardWrap.appendChild(popup);
    setTimeout(()=>popup.remove(),950);
  }
}

function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }

async function processMatches(cascadeLevel=0) {
  const matches=findMatches();
  if(matches.length===0) return;
  renderBoard('matching',matches);
  sfxMatch(matches.length);
  if(cascadeLevel>0) { sfxCascade(cascadeLevel); showComboFlash(cascadeLevel); }
  await sleep(340);
  matches.forEach(({r,c})=>{ board[r][c]=-1; });
  const cr=matches[Math.floor(matches.length/2)];
  addScore(matches.length,cr.r,cr.c);
  for(let c=0;c<COLS;c++) {
    let writeRow=ROWS-1;
    for(let r=ROWS-1;r>=0;r--) {
      if(board[r][c]!==-1){ board[writeRow][c]=board[r][c]; if(writeRow!==r) board[r][c]=-1; writeRow--; }
    }
    for(let r=writeRow;r>=0;r--) board[r][c]=randomType();
  }
  renderBoard('new-tile',[]);
  await sleep(270);
  await processMatches(cascadeLevel+1);
}

async function trySwap(r1,c1,r2,c2) {
  if(busy) return;
  busy=true;
  [board[r1][c1],board[r2][c2]]=[board[r2][c2],board[r1][c1]];
  sfxSwap();
  renderBoard();
  await sleep(160);
  if(findMatches().length===0) {
    [board[r1][c1],board[r2][c2]]=[board[r2][c2],board[r1][c1]];
    sfxInvalid();
    renderBoard();
    await sleep(120);
  } else {
    await processMatches(0);
    if(!hasAnyMove()) await reshuffleBoard();
  }
  busy=false;
}

async function reshuffleBoard() {
  const allCells=[];
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) allCells.push({r,c});
  renderBoard('matching',allCells);
  await sleep(400);
  initBoard();
  renderBoard('new-tile',allCells);
  await sleep(300);
}

function showComboFlash(cascadeLevel) {
  const combo = cascadeLevel + 1;
  if (combo < 2) return;

  if (combo > maxCombo) {
    maxCombo = combo;
    document.getElementById('combo-val').textContent = 'x' + maxCombo;
    const box = document.getElementById('combo-box');
    box.classList.remove('combo-record');
    void box.offsetWidth;
    box.classList.add('combo-record');
    setTimeout(() => box.classList.remove('combo-record'), 650);
  }

  const words = ['','','DOUBLE','TRIPLE','QUAD','PENTA','HEXA','LUCKY 7'];
  const word = words[combo] || ('x' + combo);

  const boardWrap = document.querySelector('.board-wrap');
  const old = boardWrap.querySelector('.combo-flash');
  if (old) old.remove();
  const el = document.createElement('div');
  el.className = 'combo-flash';
  el.innerHTML = `<span class="combo-word">${word}</span><span class="combo-sub">COMBO!</span>`;
  boardWrap.appendChild(el);
  setTimeout(() => el.remove(), 760);
}

function isAdjacent(r1,c1,r2,c2) { return (Math.abs(r1-r2)+Math.abs(c1-c2))===1; }

function handleSelect(r, c) {
  if(busy) return;
  if(!selected) { selected={r,c}; renderBoard(); return; }
  if(selected.r===r&&selected.c===c) { selected=null; renderBoard(); return; }
  if(isAdjacent(selected.r,selected.c,r,c)) {
    const{r:sr,c:sc}=selected; selected=null; trySwap(sr,sc,r,c);
  } else { selected={r,c}; renderBoard(); }
}

function onCellClick(e) {
  handleSelect(parseInt(e.currentTarget.dataset.r), parseInt(e.currentTarget.dataset.c));
}

function onTouchEnd(e) {
  e.preventDefault();
  handleSelect(parseInt(e.currentTarget.dataset.r), parseInt(e.currentTarget.dataset.c));
}

let resizeTimer;
function setCellSize() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const bs = getComputedStyle(document.body);
  const bPadH = parseFloat(bs.paddingLeft) + parseFloat(bs.paddingRight);
  const bPadV = parseFloat(bs.paddingTop) + parseFloat(bs.paddingBottom);

  function outerH(el) {
    if (!el) return 0;
    const s = getComputedStyle(el);
    if (s.display === 'none') return 0;
    return el.offsetHeight + parseFloat(s.marginTop) + parseFloat(s.marginBottom);
  }

  const bw   = document.querySelector('.board-wrap');
  const bwS  = getComputedStyle(bw);
  const bwPadH = parseFloat(bwS.paddingLeft) + parseFloat(bwS.paddingRight)
               + parseFloat(bwS.borderLeftWidth) + parseFloat(bwS.borderRightWidth);
  const bwPadV = parseFloat(bwS.paddingTop) + parseFloat(bwS.paddingBottom)
               + parseFloat(bwS.borderTopWidth) + parseFloat(bwS.borderBottomWidth);

  const headerH = outerH(document.querySelector('header'));
  const hudH    = outerH(document.querySelector('.hud'));

  const availW = vw - bPadH - bwPadH;
  const availH = vh - bPadV - headerH - hudH - bwPadV;

  const gap  = Math.max(2, Math.min(Math.round(vw * 0.01), 4));
  const cell = Math.max(26, Math.min((availW - 7 * gap) / 8, (availH - 7 * gap) / 8, 54));

  const root = document.documentElement;
  root.style.setProperty('--cell', cell + 'px');
  root.style.setProperty('--gap', gap + 'px');
  root.style.setProperty('--board-size', (8 * cell + 7 * gap) + 'px');
}

window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(setCellSize, 80);
});
window.addEventListener('orientationchange', () => setTimeout(setCellSize, 250));

setCellSize();
document.fonts.ready.then(setCellSize);

initBoard();
renderBoard();

document.addEventListener('click', () => { if(!audioCtx) startAmbient(); }, {once:true});
document.addEventListener('touchstart', () => { if(!audioCtx) startAmbient(); }, {once:true, passive:true});
</script>
</body>
</html>
